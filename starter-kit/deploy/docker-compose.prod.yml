version: "3.8"

# AgenticTrade Client-Side Production Stack
# For developers hosting their own API services behind the AgenticTrade marketplace.
#
# Usage:
#   cp .env.production.template .env
#   docker compose -f docker-compose.prod.yml up -d

services:
  # Your API service — customize this for your agent's backend
  my-agent-api:
    image: python:3.12-slim
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - ACF_MARKETPLACE_URL=${ACF_MARKETPLACE_URL:-https://agentictrade.io}
      - ACF_API_KEY=${ACF_API_KEY}
      - PORT=8080
    volumes:
      - ./app:/app
    working_dir: /app
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/acf.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl-certs:/etc/letsencrypt:ro
    depends_on:
      my-agent-api:
        condition: service_healthy

volumes:
  ssl-certs:
