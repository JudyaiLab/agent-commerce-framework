# AgenticTrade Nginx Configuration
# Reverse proxy with SSL, rate limiting, and security headers

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=proxy:10m rate=10r/s;

upstream acf_backend {
    server app:8092;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # SSL certificates (use Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Landing page and docs (generous rate limit)
    location / {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://acf_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints (moderate rate limit)
    location /api/v1/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://acf_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for proxy calls to external services
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Proxy calls (stricter rate limit — these cost money)
    location /api/v1/proxy/ {
        limit_req zone=proxy burst=10 nodelay;
        proxy_pass http://acf_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # IPN callbacks (no rate limit — payment provider needs reliable delivery)
    location /api/v1/ipn/ {
        proxy_pass http://acf_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    location /static/ {
        proxy_pass http://acf_backend;
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Swagger docs
    location /docs {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://acf_backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://acf_backend;
        proxy_cache_valid 200 5m;
    }

    # Health check (no rate limit)
    location /health {
        proxy_pass http://acf_backend;
        access_log off;
    }

    # Block common attack paths
    location ~ /\. { deny all; }
    location ~ /(wp-admin|wp-login|xmlrpc) { return 444; }
}
